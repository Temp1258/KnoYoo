name: Lint & Typecheck

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs for the same branch when a newer commit lands;
# saves minutes on rapid push sequences and gets green checks faster.
concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    # Match release.yml's macOS-arm64 target so platform-specific code paths
    # (keyring apple-native, tauri macOS shims) lint in the same env they ship.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          key: clippy-aarch64-apple-darwin

      # Tauri's build.rs validates bundle.externalBin paths even for
      # `cargo clippy` — the sidecars must exist on disk or the build
      # script fails before clippy ever sees the source. Fetch them the
      # same way release.yml does; the script is idempotent and the
      # rust-cache above keeps target/ hot across runs.
      - name: Fetch sidecars
        run: scripts/fetch-sidecars.sh aarch64-apple-darwin

      - name: Clippy (binary + tests)
        run: cargo clippy --all-targets -- -D warnings
        working-directory: apps/desktop/src-tauri

      - name: Unit tests
        run: cargo test
        working-directory: apps/desktop/src-tauri

  frontend:
    # Pure TS/CSS; runs on Linux to save minutes vs. macOS runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck desktop
        run: pnpm --filter desktop exec tsc --noEmit

      - name: Lint desktop
        run: pnpm --filter desktop exec eslint "src/**/*.{ts,tsx}" --max-warnings 0

      - name: Typecheck browser extension
        run: pnpm --filter @knoyoo/browser-extension exec tsc --noEmit
